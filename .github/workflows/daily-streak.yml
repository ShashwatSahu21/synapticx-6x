name: Daily Coding Streak Maintenance

on:
  schedule:
    - cron: '30 4 * * *' # Runs every day at 04:30 UTC (10:00 AM IST)
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  daily-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add Daily Developer Joke
        run: |
          echo "## Date: $(date +'%Y-%m-%d')" >> DAILY_JOKES.md
          echo "" >> DAILY_JOKES.md
          echo "\`\`\`text" >> DAILY_JOKES.md
          curl -s "https://v2.jokeapi.dev/joke/Programming?format=txt&safe-mode" >> DAILY_JOKES.md
          echo "" >> DAILY_JOKES.md
          echo "\`\`\`" >> DAILY_JOKES.md
          echo "---" >> DAILY_JOKES.md

      - name: Commit and Push
        run: |
          git config --global user.name "ShashwatSahu21"
          git config --global user.email "ShashwatSahu21@users.noreply.github.com"
          git add DAILY_JOKES.md
          git commit -m "chore: add daily developer joke & maintain streak" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
